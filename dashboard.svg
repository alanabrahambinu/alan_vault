<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
    
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4B5FD;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4F46E5" flood-opacity="0.3"/>
    </filter>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Patterns -->
    <pattern id="gridPattern" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#bgGradient)"/>
  <rect width="200" height="200" rx="20" fill="url(#gridPattern)"/>
  
  <!-- Decorative circles -->
  <circle cx="30" cy="30" r="40" fill="#ffffff" opacity="0.03"/>
  <circle cx="170" cy="170" r="50" fill="#ffffff" opacity="0.03"/>
  <circle cx="160" cy="40" r="25" fill="#ffffff" opacity="0.04"/>
  <circle cx="40" cy="160" r="20" fill="#ffffff" opacity="0.04"/>
  
  <!-- Dashboard Card Container -->
  <rect x="30" y="25" width="140" height="150" rx="12" fill="url(#cardGradient)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" filter="url(#shadow)"/>
  
  <!-- Header Section -->
  <rect x="30" y="25" width="140" height="35" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  
  <!-- Menu Icon -->
  <rect x="42" y="36" width="4" height="4" rx="1" fill="#A78BFA"/>
  <rect x="50" y="36" width="8" height="4" rx="1" fill="#A78BFA"/>
  <rect x="42" y="43" width="16" height="2" rx="1" fill="#A78BFA"/>
  
  <!-- Search Icon -->
  <circle cx="148" cy="38" r="5" fill="none" stroke="#A78BFA" stroke-width="1.5"/>
  <line x1="152" y1="42" x2="156" y2="46" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Dashboard Text -->
  <text x="65" y="48" font-family="Arial, sans-serif" font-size="7" fill="#C4B5FD" font-weight="bold">DASHBOARD</text>
  
  <!-- Stats Cards -->
  <!-- Card 1 - Files -->
  <rect x="38" y="68" width="60" height="35" rx="6" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1" stroke-width="0.5"/>
  <text x="45" y="80" font-family="Arial, sans-serif" font-size="6" fill="#A78BFA">Total Files</text>
  <text x="45" y="96" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">1,234</text>
  <text x="82" y="92" font-family="Arial, sans-serif" font-size="5" fill="#10b981">↑12%</text>
  
  <!-- Card 2 - Notes -->
  <rect x="102" y="68" width="60" height="35" rx="6" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1" stroke-width="0.5"/>
  <text x="109" y="80" font-family="Arial, sans-serif" font-size="6" fill="#A78BFA">Total Notes</text>
  <text x="109" y="96" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">567</text>
  <text x="146" y="92" font-family="Arial, sans-serif" font-size="5" fill="#10b981">↑8%</text>
  
  <!-- Card 3 - Tasks -->
  <rect x="38" y="108" width="60" height="35" rx="6" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1" stroke-width="0.5"/>
  <text x="45" y="120" font-family="Arial, sans-serif" font-size="6" fill="#A78BFA">Total Tasks</text>
  <text x="45" y="136" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">89</text>
  <text x="76" y="132" font-family="Arial, sans-serif" font-size="5" fill="#10b981">↑5%</text>
  
  <!-- Card 4 - Bookmarks -->
  <rect x="102" y="108" width="60" height="35" rx="6" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1" stroke-width="0.5"/>
  <text x="109" y="120" font-family="Arial, sans-serif" font-size="6" fill="#A78BFA">Bookmarks</text>
  <text x="109" y="136" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">234</text>
  <text x="146" y="132" font-family="Arial, sans-serif" font-size="5" fill="#ef4444">↓3%</text>
  
  <!-- Chart Section -->
  <rect x="38" y="150" width="85" height="20" rx="4" fill="#ffffff" fill-opacity="0.03"/>
  
  <!-- Chart Bars -->
  <rect x="44" y="158" width="8" height="8" rx="1" fill="#8B5CF6" opacity="0.8"/>
  <rect x="56" y="154" width="8" height="12" rx="1" fill="#8B5CF6" opacity="0.8"/>
  <rect x="68" y="152" width="8" height="14" rx="1" fill="#8B5CF6" opacity="0.8"/>
  <rect x="80" y="156" width="8" height="10" rx="1" fill="#8B5CF6" opacity="0.8"/>
  <rect x="92" y="155" width="8" height="11" rx="1" fill="#8B5CF6" opacity="0.8"/>
  <rect x="104" y="159" width="8" height="7" rx="1" fill="#8B5CF6" opacity="0.6"/>
  <rect x="116" y="157" width="8" height="9" rx="1" fill="#8B5CF6" opacity="0.7"/>
  
  <!-- Chart Line -->
  <polyline points="48,158 60,154 72,152 84,156 96,155 108,159 120,157" fill="none" stroke="#A78BFA" stroke-width="1" opacity="0.5"/>
  
  <!-- Activity Indicator -->
  <circle cx="130" cy="160" r="3" fill="#10b981" filter="url(#glow)"/>
  <circle cx="140" cy="160" r="3" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="150" cy="160" r="3" fill="#ef4444" filter="url(#glow)"/>
  
  <!-- Lock Icon (Security) -->
  <rect x="168" y="170" width="20" height="15" rx="3" fill="#ffffff" fill-opacity="0.1"/>
  <path d="M174 173 L174 175" stroke="#A78BFA" stroke-width="1.5" fill="none"/>
  <path d="M172 175 L172 182 C172 183 173 184 174 184 L182 184 C183 184 184 183 184 182 L184 175 Z" fill="#A78BFA" opacity="0.8"/>
  <circle cx="178" cy="180" r="1.5" fill="#ffffff"/>
  <line x1="178" y1="180" x2="178" y2="182" stroke="#ffffff" stroke-width="0.8"/>
  
  <!-- Bottom Decoration -->
  <rect x="30" y="172" width="140" height="3" rx="1.5" fill="url(#lineGradient)"/>
  
  <!-- Floating Elements -->
  <circle cx="18" cy="50" r="2" fill="#A78BFA" opacity="0.5"/>
  <circle cx="182" cy="90" r="2" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="25" cy="120" r="1.5" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="175" cy="140" r="1.5" fill="#A78BFA" opacity="0.4"/>
  
  <!-- Sparkle Effects -->
  <g opacity="0.6">
    <path d="M15 15 L17 15 L17 17 L15 17 Z" fill="#A78BFA"/>
    <path d="M185 25 L187 25 L187 27 L185 27 Z" fill="#C4B5FD"/>
    <path d="M10 95 L12 95 L12 97 L10 97 Z" fill="#8B5CF6"/>
    <path d="M190 110 L192 110 L192 112 L190 112 Z" fill="#A78BFA"/>
  </g>
  
  <!-- Alan Vault Text -->
  <text x="100" y="194" font-family="Arial, sans-serif" font-size="6" fill="#C4B5FD" text-anchor="middle" font-weight="bold" letter-spacing="1" opacity="0.7">ALAN VAULT</text>
</svg>