<!-- folder-card.html - Folder Card Component -->
<div class="folder-card-component">
    <div class="folder-card-inner">
        <div class="folder-icon">📁</div>
        <div class="folder-info">
            <h4 class="folder-name">Documents</h4>
            <span class="folder-count">12 items</span>
        </div>
        <div class="folder-actions">
            <button class="folder-action-btn" title="Open">📂</button>
            <button class="folder-action-btn rename" title="Rename">✏️</button>
            <button class="folder-action-btn delete" title="Delete">🗑️</button>
        </div>
    </div>
</div>

<style>
    .folder-card-component {
        background: linear-gradient(135deg, rgba(79, 70, 229, 0.1), rgba(139, 92, 246, 0.05));
        border: 1px solid rgba(139, 92, 246, 0.2);
        border-radius: 16px;
        transition: all 0.3s;
        cursor: pointer;
        overflow: hidden;
    }
    
    .folder-card-component:hover {
        transform: translateY(-5px);
        border-color: rgba(139, 92, 246, 0.5);
        box-shadow: 0 10px 30px rgba(79, 70, 229, 0.2);
    }
    
    .folder-card-inner {
        padding: 1.5rem;
        text-align: center;
    }
    
    .folder-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
    }
    
    .folder-info {
        margin-bottom: 1rem;
    }
    
    .folder-name {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
    }
    
    .folder-count {
        font-size: 0.75rem;
        color: var(--text-tertiary);
    }
    
    .folder-actions {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        opacity: 0;
        transition: opacity 0.3s;
    }
    
    .folder-card-component:hover .folder-actions {
        opacity: 1;
    }
    
    .folder-action-btn {
        width: 32px;
        height: 32px;
        background: rgba(139, 92, 246, 0.2);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 0.9rem;
    }
    
    .folder-action-btn:hover {
        background: rgba(139, 92, 246, 0.4);
        transform: scale(1.05);
    }
    
    /* List View */
    .folder-card-component.list-view {
        margin-bottom: 0.5rem;
    }
    
    .folder-card-component.list-view .folder-card-inner {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem 1rem;
        text-align: left;
    }
    
    .folder-card-component.list-view .folder-icon {
        font-size: 1.5rem;
        margin-bottom: 0;
    }
    
    .folder-card-component.list-view .folder-info {
        flex: 1;
        margin-bottom: 0;
    }
    
    .folder-card-component.list-view .folder-name {
        font-size: 0.9rem;
        margin-bottom: 0;
    }
</style>

<script>
    class FolderCard {
        constructor(folder, index, onOpen, onRename, onDelete) {
            this.folder = folder;
            this.index = index;
            this.onOpen = onOpen;
            this.onRename = onRename;
            this.onDelete = onDelete;
        }
        
        render(view = 'grid') {
            const card = document.createElement('div');
            card.className = `folder-card-component ${view}-view`;
            card.innerHTML = `
                <div class="folder-card-inner">
                    <div class="folder-icon">📁</div>
                    <div class="folder-info">
                        <h4 class="folder-name">${this.escapeHtml(this.folder.name)}</h4>
                        <span class="folder-count">${this.folder.count || 0} items</span>
                    </div>
                    <div class="folder-actions">
                        <button class="folder-action-btn open" data-action="open">📂</button>
                        <button class="folder-action-btn rename" data-action="rename">✏️</button>
                        <button class="folder-action-btn delete" data-action="delete">🗑️</button>
                    </div>
                </div>
            `;
            
            card.querySelector('[data-action="open"]').addEventListener('click', (e) => {
                e.stopPropagation();
                if (this.onOpen) this.onOpen(this.index);
            });
            
            card.querySelector('[data-action="rename"]').addEventListener('click', (e) => {
                e.stopPropagation();
                const newName = prompt('Enter new folder name:', this.folder.name);
                if (newName && this.onRename) this.onRename(this.index, newName);
            });
            
            card.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm('Delete this folder?')) {
                    if (this.onDelete) this.onDelete(this.index);
                }
            });
            
            card.addEventListener('click', () => {
                if (this.onOpen) this.onOpen(this.index);
            });
            
            return card;
        }
        
        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    }
</script>
