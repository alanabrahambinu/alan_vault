<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Alan Vault Premium</title>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Alan Vault</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/favicon/android-chrome-512x512.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
    <meta name="theme-color" content="#4F46E5">
    
    <link rel="stylesheet" href="dashboard.css">
</head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 50%, rgba(79, 70, 229, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
        }

        /* Premium Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(139, 92, 246, 0.2);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4F46E5, #8B5CF6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.3);
        }

        .sidebar-nav {
            padding: 1.5rem;
            flex: 1;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: #a1a1aa;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            text-align: left;
            border-radius: 12px;
            transition: all 0.3s;
            margin-bottom: 0.5rem;
            text-decoration: none;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(139, 92, 246, 0.15);
            color: #8B5CF6;
        }

        /* Admin Nav Item */
        .admin-nav-item {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 1rem;
            padding-top: 1rem;
            color: #ef4444;
        }

        .admin-nav-item:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(10, 10, 15, 0.95);
        }

        .storage-info {
            background: rgba(139, 92, 246, 0.1);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .storage-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .storage-used {
            height: 100%;
            background: linear-gradient(90deg, #4F46E5, #8B5CF6);
            width: 0%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        /* Mobile Menu Button */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 101;
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 2rem;
            transition: margin-left 0.3s;
        }

        /* Top Bar */
        .top-bar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 50px;
            width: 300px;
            color: white;
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B5CF6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .search-box::placeholder {
            color: #71717a;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Admin Icon in Top Bar */
        .admin-icon {
            background: linear-gradient(135deg, #ef4444, #f59e0b);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s;
            cursor: pointer;
        }

        .admin-icon:hover {
            transform: scale(1.1);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4F46E5, #8B5CF6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .user-avatar:hover {
            transform: scale(1.05);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.2), rgba(139, 92, 246, 0.2));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .stat-info h3 {
            font-size: 0.875rem;
            color: #a1a1aa;
            margin-bottom: 0.5rem;
        }

        .stat-info p {
            font-size: 2rem;
            font-weight: 700;
            color: #8B5CF6;
        }

        /* Sections */
        .section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .section h2 {
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .item-card:hover {
            border-color: rgba(139, 92, 246, 0.3);
            background: rgba(139, 92, 246, 0.05);
        }

        .item-info {
            flex: 1;
        }

        .item-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .item-meta {
            font-size: 0.75rem;
            color: #71717a;
        }

        .item-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            padding: 6px 12px;
            background: rgba(139, 92, 246, 0.2);
            border: none;
            border-radius: 8px;
            color: #8B5CF6;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-icon:hover {
            background: rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4F46E5, #8B5CF6);
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: #1a1a2e;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 24px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
        }

        .modal-content input:focus,
        .modal-content textarea:focus,
        .modal-content select:focus {
            outline: none;
            border-color: #8B5CF6;
        }

        .pages {
            display: none;
        }

        .pages.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(16, 185, 129, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-size: 0.875rem;
            z-index: 1001;
            animation: slideInRight 0.3s ease;
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.95);
        }

        @keyframes slideInRight {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #71717a;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
            
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                padding: 1rem;
                padding-top: 4rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .top-bar {
                flex-direction: column;
            }
            
            .search-box {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <!-- Mobile Menu Button -->
    <div class="mobile-menu-btn" onclick="toggleSidebar()">
        ☰
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">🔐</div>
                <span>Alan Vault</span>
            </div>
        </div>
        <div class="sidebar-nav">
            <button class="nav-item active" onclick="showPage('dashboard')">
                📊 Dashboard
            </button>
            <button class="nav-item" onclick="showPage('vault')">
                📁 My Vault
            </button>
            <button class="nav-item" onclick="showPage('notes')">
                📝 Notes
            </button>
            <button class="nav-item" onclick="showPage('tasks')">
                ✅ Tasks
            </button>
            <button class="nav-item" onclick="showPage('bookmarks')">
                🔗 Bookmarks
            </button>
            <button class="nav-item" onclick="window.location.href='profile.html'">
                👤 Profile
            </button>
            <button class="nav-item" onclick="window.location.href='settings.html'">
                ⚙️ Settings
            </button>
            <!-- Admin Panel Link - Opens in New Tab -->
            <button class="nav-item admin-nav-item" onclick="window.open('admin-login.html', '_blank')">
                👑 Admin Panel
            </button>
        </div>
        <div class="sidebar-footer">
            <div class="storage-info">
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                    <span>💾 Storage</span>
                    <span id="storageText">0 GB / 5 GB</span>
                </div>
                <div class="storage-bar">
                    <div class="storage-used" id="storageBar"></div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">
                🚪 Logout
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="top-bar">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search files, notes, tasks..." onkeyup="searchAll()">
            <div class="user-info">
                <span>Welcome back, <strong id="usernameDisplay"></strong></span>
                <!-- Admin Icon in Top Bar - Opens in New Tab -->
                <div class="admin-icon" onclick="window.open('admin-login.html', '_blank')" title="Admin Panel">
                    👑
                </div>
                <div class="user-avatar" onclick="window.location.href='profile.html'">
                    👤
                </div>
            </div>
        </div>

        <!-- Dashboard Page -->
        <div id="dashboardPage" class="pages active">
            <h1 style="margin-bottom: 1.5rem;">📊 Dashboard</h1>
            <div class="stats-grid">
                <div class="stat-card" onclick="showPage('vault')">
                    <div class="stat-icon">📁</div>
                    <div class="stat-info">
                        <h3>Total Files</h3>
                        <p id="totalFiles">0</p>
                    </div>
                </div>
                <div class="stat-card" onclick="showPage('notes')">
                    <div class="stat-icon">📝</div>
                    <div class="stat-info">
                        <h3>Notes</h3>
                        <p id="totalNotes">0</p>
                    </div>
                </div>
                <div class="stat-card" onclick="showPage('tasks')">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <h3>Tasks</h3>
                        <p id="totalTasks">0</p>
                    </div>
                </div>
                <div class="stat-card" onclick="showPage('bookmarks')">
                    <div class="stat-icon">🔗</div>
                    <div class="stat-info">
                        <h3>Bookmarks</h3>
                        <p id="totalBookmarks">0</p>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>⚡ Quick Actions</h2>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <button class="btn-primary" onclick="openModal('file')">📤 Upload File</button>
                    <button class="btn-primary" onclick="openModal('note')">📝 New Note</button>
                    <button class="btn-primary" onclick="openModal('task')">✅ New Task</button>
                    <button class="btn-primary" onclick="openModal('bookmark')">🔗 Add Bookmark</button>
                </div>
            </div>

            <div class="section">
                <h2>🕐 Recent Activity</h2>
                <div id="recentItems" class="item-list"></div>
            </div>
        </div>

        <!-- Vault Page -->
        <div id="vaultPage" class="pages">
            <h1 style="margin-bottom: 1.5rem;">📁 My Vault</h1>
            <div class="section">
                <button class="btn-primary" onclick="openModal('file')">➕ Upload File</button>
                <div id="filesList" class="item-list" style="margin-top: 1.5rem;"></div>
            </div>
        </div>

        <!-- Notes Page -->
        <div id="notesPage" class="pages">
            <h1 style="margin-bottom: 1.5rem;">📝 Notes</h1>
            <div class="section">
                <button class="btn-primary" onclick="openModal('note')">📝 Create Note</button>
                <div id="notesList" class="item-list" style="margin-top: 1.5rem;"></div>
            </div>
        </div>

        <!-- Tasks Page -->
        <div id="tasksPage" class="pages">
            <h1 style="margin-bottom: 1.5rem;">✅ Tasks</h1>
            <div class="section">
                <button class="btn-primary" onclick="openModal('task')">✅ Create Task</button>
                <div id="tasksList" class="item-list" style="margin-top: 1.5rem;"></div>
            </div>
        </div>

        <!-- Bookmarks Page -->
        <div id="bookmarksPage" class="pages">
            <h1 style="margin-bottom: 1.5rem;">🔗 Bookmarks</h1>
            <div class="section">
                <button class="btn-primary" onclick="openModal('bookmark')">🔗 Add Bookmark</button>
                <div id="bookmarksList" class="item-list" style="margin-top: 1.5rem;"></div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Add Item</h3>
            <div id="modalBody"></div>
            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
                <button class="btn-icon" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="saveModal()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentModalType = null;
        let currentEditId = null;
        let appData = { files: [], notes: [], tasks: [], bookmarks: [] };

        // Initialize
        function init() {
            const user = localStorage.getItem('currentUser');
            if (!user) { 
                window.location.href = 'login.html'; 
                return; 
            }
            currentUser = JSON.parse(user);
            document.getElementById('usernameDisplay').textContent = currentUser.username;
            loadData();
            updateDisplay();
        }

        // Load user data
        function loadData() {
            const data = localStorage.getItem(`vault_${currentUser.id}`);
            if (data) {
                appData = JSON.parse(data);
            } else {
                appData = { files: [], notes: [], tasks: [], bookmarks: [] };
            }
        }

        // Save user data
        function saveData() {
            localStorage.setItem(`vault_${currentUser.id}`, JSON.stringify(appData));
            updateDisplay();
            showToast('Changes saved successfully!', 'success');
        }

        // Update all displays
        function updateDisplay() {
            updateStats();
            renderFiles();
            renderNotes();
            renderTasks();
            renderBookmarks();
            renderRecent();
            updateStorage();
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalFiles').textContent = appData.files.length;
            document.getElementById('totalNotes').textContent = appData.notes.length;
            document.getElementById('totalTasks').textContent = appData.tasks.filter(t => t.completed).length;
            document.getElementById('totalBookmarks').textContent = appData.bookmarks.length;
        }

        // Update storage display
        function updateStorage() {
            const totalSize = appData.files.reduce((sum, f) => sum + (f.size || 0), 0);
            const usedGB = (totalSize / (1024 * 1024 * 1024)).toFixed(2);
            const percent = Math.min((totalSize / (5 * 1024 * 1024 * 1024)) * 100, 100);
            document.getElementById('storageText').textContent = `${usedGB} GB / 5 GB`;
            document.getElementById('storageBar').style.width = `${percent}%`;
        }

        // Render files
        function renderFiles() {
            const container = document.getElementById('filesList');
            if (!appData.files.length) { 
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📁</div><p>No files yet. Click "Upload File" to get started!</p></div>'; 
                return; 
            }
            container.innerHTML = appData.files.map((f, i) => `
                <div class="item-card">
                    <div class="item-info">
                        <div class="item-title">📄 ${escapeHtml(f.name)}</div>
                        <div class="item-meta">${formatBytes(f.size)} • ${new Date(f.date).toLocaleDateString()}</div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-icon" onclick="downloadFile(${i})">📥 Download</button>
                        <button class="btn-icon btn-danger" onclick="deleteFile(${i})">🗑 Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Render notes
        function renderNotes() {
            const container = document.getElementById('notesList');
            if (!appData.notes.length) { 
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>No notes yet. Click "Create Note" to get started!</p></div>'; 
                return; 
            }
            container.innerHTML = appData.notes.map((n, i) => `
                <div class="item-card">
                    <div class="item-info">
                        <div class="item-title">📝 ${escapeHtml(n.title)}</div>
                        <div class="item-meta">Updated: ${new Date(n.updated).toLocaleDateString()}</div>
                        <div class="item-meta">${escapeHtml(n.content.substring(0, 100))}${n.content.length > 100 ? '...' : ''}</div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-icon" onclick="editNote(${i})">✏️ Edit</button>
                        <button class="btn-icon btn-danger" onclick="deleteNote(${i})">🗑 Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Render tasks
        function renderTasks() {
            const container = document.getElementById('tasksList');
            if (!appData.tasks.length) { 
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✅</div><p>No tasks yet. Click "Create Task" to get started!</p></div>'; 
                return; 
            }
            container.innerHTML = appData.tasks.map((t, i) => `
                <div class="item-card">
                    <div class="item-info">
                        <div class="item-title">${t.completed ? '✅' : '⭕'} ${escapeHtml(t.title)}</div>
                        <div class="item-meta">Priority: ${t.priority} • Due: ${t.dueDate || 'No due date'}</div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-icon" onclick="toggleTask(${i})">${t.completed ? '🔄 Reopen' : '✔ Complete'}</button>
                        <button class="btn-icon btn-danger" onclick="deleteTask(${i})">🗑 Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Render bookmarks
        function renderBookmarks() {
            const container = document.getElementById('bookmarksList');
            if (!appData.bookmarks.length) { 
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔗</div><p>No bookmarks yet. Click "Add Bookmark" to get started!</p></div>'; 
                return; 
            }
            container.innerHTML = appData.bookmarks.map((b, i) => `
                <div class="item-card">
                    <div class="item-info">
                        <div class="item-title">🔗 ${escapeHtml(b.title)}</div>
                        <div class="item-meta"><a href="${escapeHtml(b.url)}" target="_blank" style="color:#8B5CF6;">${escapeHtml(b.url)}</a></div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-icon" onclick="window.open('${escapeHtml(b.url)}', '_blank')">🔗 Open</button>
                        <button class="btn-icon btn-danger" onclick="deleteBookmark(${i})">🗑 Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Render recent items
        function renderRecent() {
            const all = [
                ...appData.files.map(f => ({...f, type:'file', name:f.name, date: f.date})),
                ...appData.notes.map(n => ({...n, type:'note', name:n.title, date: n.updated})),
                ...appData.tasks.map(t => ({...t, type:'task', name:t.title, date: t.updated})),
                ...appData.bookmarks.map(b => ({...b, type:'bookmark', name:b.title, date: b.created}))
            ];
            all.sort((a,b) => new Date(b.date) - new Date(a.date));
            const container = document.getElementById('recentItems');
            if (!all.length) { 
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🕐</div><p>No recent activity. Start by adding some items!</p></div>'; 
                return; 
            }
            container.innerHTML = all.slice(0, 10).map(i => `
                <div class="item-card">
                    <div class="item-info">
                        <div class="item-title">${i.type === 'file' ? '📄' : i.type === 'note' ? '📝' : i.type === 'task' ? '✅' : '🔗'} ${escapeHtml(i.name)}</div>
                        <div class="item-meta">${i.type} • ${new Date(i.date).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        // Search all items
        function searchAll() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (!query) { 
                updateDisplay(); 
                return; 
            }
            
            const filteredFiles = appData.files.filter(f => f.name.toLowerCase().includes(query));
            const filteredNotes = appData.notes.filter(n => n.title.toLowerCase().includes(query));
            const filteredTasks = appData.tasks.filter(t => t.title.toLowerCase().includes(query));
            const filteredBookmarks = appData.bookmarks.filter(b => b.title.toLowerCase().includes(query));
            
            document.getElementById('filesList').innerHTML = filteredFiles.length ? filteredFiles.map(f => `<div class="item-card">📄 ${escapeHtml(f.name)}</div>`).join('') : '<div class="empty-state"><p>No files found</p></div>';
            document.getElementById('notesList').innerHTML = filteredNotes.length ? filteredNotes.map(n => `<div class="item-card">📝 ${escapeHtml(n.title)}</div>`).join('') : '<div class="empty-state"><p>No notes found</p></div>';
            document.getElementById('tasksList').innerHTML = filteredTasks.length ? filteredTasks.map(t => `<div class="item-card">✅ ${escapeHtml(t.title)}</div>`).join('') : '<div class="empty-state"><p>No tasks found</p></div>';
            document.getElementById('bookmarksList').innerHTML = filteredBookmarks.length ? filteredBookmarks.map(b => `<div class="item-card">🔗 ${escapeHtml(b.title)}</div>`).join('') : '<div class="empty-state"><p>No bookmarks found</p></div>';
        }

        // Modal functions
        function openModal(type, editId = null) {
            currentModalType = type; 
            currentEditId = editId;
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            let edit = null;
            
            if (editId !== null) { 
                if (type === 'note') edit = appData.notes[editId]; 
                if (type === 'task') edit = appData.tasks[editId]; 
                if (type === 'bookmark') edit = appData.bookmarks[editId]; 
            }
            
            if (type === 'file') { 
                title.textContent = '📤 Upload File'; 
                body.innerHTML = '<input type="file" id="fileInput" accept="*/*">'; 
            }
            else if (type === 'note') { 
                title.textContent = edit ? '✏️ Edit Note' : '📝 Create Note'; 
                body.innerHTML = `<input type="text" id="noteTitle" placeholder="Note title" value="${edit ? escapeHtml(edit.title) : ''}"><textarea id="noteContent" rows="6" placeholder="Write your note here...">${edit ? escapeHtml(edit.content) : ''}</textarea>`; 
            }
            else if (type === 'task') { 
                title.textContent = edit ? '✏️ Edit Task' : '✅ Create Task'; 
                body.innerHTML = `<input type="text" id="taskTitle" placeholder="Task title" value="${edit ? escapeHtml(edit.title) : ''}"><select id="taskPriority"><option ${edit && edit.priority === 'Low' ? 'selected' : ''}>Low</option><option ${edit && edit.priority === 'Medium' ? 'selected' : ''}>Medium</option><option ${edit && edit.priority === 'High' ? 'selected' : ''}>High</option></select><input type="date" id="taskDueDate" value="${edit ? edit.dueDate : ''}">`; 
            }
            else if (type === 'bookmark') { 
                title.textContent = edit ? '✏️ Edit Bookmark' : '🔗 Add Bookmark'; 
                body.innerHTML = `<input type="text" id="bookmarkTitle" placeholder="Bookmark title" value="${edit ? escapeHtml(edit.title) : ''}"><input type="url" id="bookmarkUrl" placeholder="https://example.com" value="${edit ? escapeHtml(edit.url) : ''}">`; 
            }
            
            modal.classList.add('active');
        }

        function closeModal() { 
            document.getElementById('modal').classList.remove('active'); 
            currentModalType = null; 
            currentEditId = null; 
        }

        function saveModal() {
            if (currentModalType === 'file') {
                const file = document.getElementById('fileInput').files[0];
                if (file) { 
                    appData.files.push({ 
                        name: file.name, 
                        size: file.size, 
                        type: file.type,
                        date: new Date().toISOString(), 
                        data: URL.createObjectURL(file) 
                    }); 
                    saveData(); 
                    showToast(`File "${file.name}" uploaded successfully!`, 'success');
                }
            } 
            else if (currentModalType === 'note') {
                const title = document.getElementById('noteTitle').value;
                const content = document.getElementById('noteContent').value;
                if (title) { 
                    if (currentEditId !== null) { 
                        appData.notes[currentEditId] = {...appData.notes[currentEditId], title, content, updated: new Date().toISOString()}; 
                        showToast('Note updated!', 'success');
                    } else { 
                        appData.notes.push({ id: Date.now(), title, content, created: new Date().toISOString(), updated: new Date().toISOString() }); 
                        showToast('Note created!', 'success');
                    } 
                    saveData(); 
                }
            } 
            else if (currentModalType === 'task') {
                const title = document.getElementById('taskTitle').value;
                const priority = document.getElementById('taskPriority').value;
                const dueDate = document.getElementById('taskDueDate').value;
                if (title) { 
                    if (currentEditId !== null) { 
                        appData.tasks[currentEditId] = {...appData.tasks[currentEditId], title, priority, dueDate, updated: new Date().toISOString()}; 
                        showToast('Task updated!', 'success');
                    } else { 
                        appData.tasks.push({ id: Date.now(), title, priority, dueDate, completed: false, created: new Date().toISOString() }); 
                        showToast('Task created!', 'success');
                    } 
                    saveData(); 
                }
            } 
            else if (currentModalType === 'bookmark') {
                const title = document.getElementById('bookmarkTitle').value;
                const url = document.getElementById('bookmarkUrl').value;
                if (title && url) { 
                    if (currentEditId !== null) { 
                        appData.bookmarks[currentEditId] = {...appData.bookmarks[currentEditId], title, url, updated: new Date().toISOString()}; 
                        showToast('Bookmark updated!', 'success');
                    } else { 
                        appData.bookmarks.push({ id: Date.now(), title, url, created: new Date().toISOString() }); 
                        showToast('Bookmark added!', 'success');
                    } 
                    saveData(); 
                }
            }
            closeModal();
        }

        // CRUD operations
        function deleteFile(i) { 
            if (confirm('Are you sure you want to delete this file?')) { 
                appData.files.splice(i,1); 
                saveData(); 
                showToast('File deleted', 'success');
            } 
        }
        
        function deleteNote(i) { 
            if (confirm('Are you sure you want to delete this note?')) { 
                appData.notes.splice(i,1); 
                saveData(); 
                showToast('Note deleted', 'success');
            } 
        }
        
        function deleteTask(i) { 
            if (confirm('Are you sure you want to delete this task?')) { 
                appData.tasks.splice(i,1); 
                saveData(); 
                showToast('Task deleted', 'success');
            } 
        }
        
        function deleteBookmark(i) { 
            if (confirm('Are you sure you want to delete this bookmark?')) { 
                appData.bookmarks.splice(i,1); 
                saveData(); 
                showToast('Bookmark deleted', 'success');
            } 
        }
        
        function editNote(i) { 
            openModal('note', i); 
        }
        
        function toggleTask(i) { 
            appData.tasks[i].completed = !appData.tasks[i].completed; 
            saveData(); 
            showToast(appData.tasks[i].completed ? 'Task completed! 🎉' : 'Task reopened', 'success');
        }
        
        function downloadFile(i) { 
            const file = appData.files[i]; 
            const link = document.createElement('a'); 
            link.href = file.data; 
            link.download = file.name; 
            link.click(); 
            showToast(`Downloading "${file.name}"...`, 'success');
        }
        
        // UI functions
        function showPage(page) { 
            const targetPage = document.getElementById(`${page}Page`);
            if (!targetPage) return;
            
            document.querySelectorAll('.pages').forEach(p => p.classList.remove('active')); 
            targetPage.classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) {
                event.target.classList.add('active');
            }
            
            // Close sidebar on mobile
            if (window.innerWidth <= 768) {
                toggleSidebar();
            }
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
        
        function logout() { 
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('currentUser'); 
                localStorage.removeItem('loggedIn'); 
                window.location.href = 'login.html'; 
            }
        }
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'error' : ''}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // Utility functions
        function formatBytes(bytes) { 
            if(bytes === 0) return '0 Bytes'; 
            const k = 1024; 
            const i = Math.floor(Math.log(bytes) / Math.log(k)); 
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + ['Bytes', 'KB', 'MB', 'GB'][i]; 
        }
        
        function escapeHtml(text) { 
            if (!text) return '';
            const div = document.createElement('div'); 
            div.textContent = text; 
            return div.innerHTML; 
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        }
        
        // Start the app
        init();
    </script>
</body>
</html>
