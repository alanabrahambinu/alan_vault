<!-- note-card.html - Note Card Component -->
<div class="note-card-component">
    <div class="note-card-header">
        <div class="note-category">📝 General</div>
        <button class="note-pin-btn" title="Pin note">📌</button>
    </div>
    <div class="note-card-body">
        <h4 class="note-title">Meeting Notes</h4>
        <p class="note-preview">Discussion about Q4 goals and project milestones...</p>
    </div>
    <div class="note-card-footer">
        <span class="note-date">Dec 15, 2024</span>
        <div class="note-actions">
            <button class="note-action edit" title="Edit">✏️</button>
            <button class="note-action delete" title="Delete">🗑️</button>
        </div>
    </div>
</div>

<style>
    .note-card-component {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        transition: all 0.3s;
        cursor: pointer;
        overflow: hidden;
    }
    
    .note-card-component:hover {
        transform: translateY(-5px);
        border-color: rgba(139, 92, 246, 0.3);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    .note-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 1rem 0.5rem;
    }
    
    .note-category {
        font-size: 0.7rem;
        padding: 0.25rem 0.75rem;
        background: rgba(139, 92, 246, 0.2);
        border-radius: 50px;
        color: #8B5CF6;
    }
    
    .note-pin-btn {
        background: transparent;
        border: none;
        cursor: pointer;
        opacity: 0;
        transition: all 0.3s;
        font-size: 0.9rem;
    }
    
    .note-card-component:hover .note-pin-btn {
        opacity: 1;
    }
    
    .note-card-body {
        padding: 0.5rem 1rem 1rem;
    }
    
    .note-title {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
    }
    
    .note-preview {
        font-size: 0.8rem;
        color: #a1a1aa;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    
    .note-card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 1rem 1rem;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .note-date {
        font-size: 0.7rem;
        color: #71717a;
    }
    
    .note-actions {
        display: flex;
        gap: 0.5rem;
        opacity: 0;
        transition: opacity 0.3s;
    }
    
    .note-card-component:hover .note-actions {
        opacity: 1;
    }
    
    .note-action {
        background: rgba(139, 92, 246, 0.2);
        border: none;
        border-radius: 6px;
        padding: 0.25rem 0.5rem;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 0.8rem;
    }
    
    .note-action:hover {
        background: rgba(139, 92, 246, 0.4);
    }
    
    .note-action.delete:hover {
        background: rgba(239, 68, 68, 0.4);
    }
</style>

<script>
    class NoteCard {
        constructor(note, index, onEdit, onDelete) {
            this.note = note;
            this.index = index;
            this.onEdit = onEdit;
            this.onDelete = onDelete;
        }
        
        render() {
            const card = document.createElement('div');
            card.className = 'note-card-component';
            card.innerHTML = `
                <div class="note-card-header">
                    <span class="note-category">📝 ${this.escapeHtml(this.note.category || 'General')}</span>
                    <button class="note-pin-btn">📌</button>
                </div>
                <div class="note-card-body">
                    <h4 class="note-title">${this.escapeHtml(this.note.title)}</h4>
                    <p class="note-preview">${this.escapeHtml(this.note.content.substring(0, 100))}${this.note.content.length > 100 ? '...' : ''}</p>
                </div>
                <div class="note-card-footer">
                    <span class="note-date">${new Date(this.note.updated).toLocaleDateString()}</span>
                    <div class="note-actions">
                        <button class="note-action edit" data-action="edit">✏️</button>
                        <button class="note-action delete" data-action="delete">🗑️</button>
                    </div>
                </div>
            `;
            
            card.querySelector('[data-action="edit"]').addEventListener('click', (e) => {
                e.stopPropagation();
                if (this.onEdit) this.onEdit(this.index);
            });
            
            card.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
                e.stopPropagation();
                if (this.onDelete && confirm('Delete this note?')) this.onDelete(this.index);
            });
            
            card.addEventListener('click', () => {
                if (this.onEdit) this.onEdit(this.index);
            });
            
            return card;
        }
        
        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    }
</script>
