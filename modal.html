<!-- modal.html - Modal Dialog Component -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3 class="modal-title">Modal Title</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <p>Modal content goes here...</p>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" onclick="confirmModal()">Confirm</button>
        </div>
    </div>
</div>

<style>
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        animation: fadeIn 0.3s ease;
    }
    
    .modal-overlay.active {
        display: flex;
    }
    
    .modal-container {
        background: #1a1a2e;
        border: 1px solid rgba(139, 92, 246, 0.3);
        border-radius: 24px;
        width: 90%;
        max-width: 500px;
        max-height: 85vh;
        overflow: hidden;
        animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .modal-title {
        font-size: 1.2rem;
        font-weight: 600;
    }
    
    .modal-close {
        width: 32px;
        height: 32px;
        background: rgba(255, 255, 255, 0.05);
        border: none;
        border-radius: 8px;
        color: #a1a1aa;
        cursor: pointer;
        transition: all 0.3s;
    }
    
    .modal-close:hover {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
    }
    
    .modal-body {
        padding: 1.5rem;
        max-height: 60vh;
        overflow-y: auto;
    }
    
    .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 1rem;
        padding: 1rem 1.5rem;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    /* Modal Sizes */
    .modal-container.small { max-width: 400px; }
    .modal-container.medium { max-width: 600px; }
    .modal-container.large { max-width: 800px; }
    .modal-container.xlarge { max-width: 1100px; }
    
    /* Modal Types */
    .modal-container.confirm .modal-footer { justify-content: center; }
    .modal-container.alert .modal-footer { justify-content: center; }
    .modal-container.alert .modal-body { text-align: center; }
    
    .modal-icon {
        font-size: 4rem;
        text-align: center;
        margin-bottom: 1rem;
    }
</style>

<script>
    class Modal {
        constructor() {
            this.modal = document.getElementById('modalOverlay');
            this.titleEl = document.querySelector('.modal-title');
            this.bodyEl = document.querySelector('.modal-body');
            this.onConfirm = null;
            this.onCancel = null;
        }
        
        show(options = {}) {
            const {
                title = 'Modal',
                content = '',
                type = 'default',
                size = 'medium',
                confirmText = 'Confirm',
                cancelText = 'Cancel',
                onConfirm = null,
                onCancel = null,
                showCancel = true
            } = options;
            
            this.titleEl.textContent = title;
            this.bodyEl.innerHTML = content;
            this.onConfirm = onConfirm;
            this.onCancel = onCancel;
            
            const container = this.modal.querySelector('.modal-container');
            container.className = `modal-container ${size} ${type}`;
            
            const footer = this.modal.querySelector('.modal-footer');
            footer.innerHTML = showCancel ? `
                <button class="btn-secondary" onclick="window.currentModal.cancel()">${cancelText}</button>
                <button class="btn-primary" onclick="window.currentModal.confirm()">${confirmText}</button>
            ` : `
                <button class="btn-primary" onclick="window.currentModal.confirm()">${confirmText}</button>
            `;
            
            this.modal.classList.add('active');
        }
        
        confirm() {
            if (this.onConfirm) this.onConfirm();
            this.hide();
        }
        
        cancel() {
            if (this.onCancel) this.onCancel();
            this.hide();
        }
        
        hide() {
            this.modal.classList.remove('active');
        }
        
        showConfirm(options) {
            this.show({
                type: 'confirm',
                content: `<div class="modal-icon">❓</div><p>${options.message || 'Are you sure?'}</p>`,
                confirmText: options.confirmText || 'Yes',
                cancelText: options.cancelText || 'No',
                onConfirm: options.onConfirm,
                onCancel: options.onCancel
            });
        }
        
        showAlert(options) {
            this.show({
                type: 'alert',
                content: `<div class="modal-icon">${options.icon || 'ℹ️'}</div><p>${options.message}</p>`,
                confirmText: options.confirmText || 'OK',
                showCancel: false,
                onConfirm: options.onConfirm
            });
        }
        
        showForm(options) {
            this.show({
                title: options.title || 'Form',
                content: options.formHtml || '',
                confirmText: options.submitText || 'Submit',
                cancelText: 'Cancel',
                onConfirm: options.onSubmit,
                onCancel: options.onCancel
            });
        }
    }
    
    function closeModal() {
        if (window.currentModal) window.currentModal.hide();
    }
    
    function confirmModal() {
        if (window.currentModal) window.currentModal.confirm();
    }
    
    window.currentModal = new Modal();
    
    // Close modal on escape key
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && window.currentModal.modal.classList.contains('active')) {
            window.currentModal.hide();
        }
    });
    
    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
        if (e.target === document.getElementById('modalOverlay')) {
            window.currentModal.hide();
        }
    });
</script>
