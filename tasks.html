<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Alan Vault</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/favicon/android-chrome-512x512.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
    <meta name="theme-color" content="#4F46E5">
    
    <link rel="stylesheet" href="theme.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: white; transition: background 0.3s, color 0.3s; }
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 20% 50%, rgba(79,70,229,0.15) 0%, transparent 50%); }
        
        /* ===== SIDEBAR ===== */
        .sidebar { position: fixed; left: 0; top: 0; width: 280px; height: 100vh; background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); border-right: 1px solid rgba(139,92,246,0.2); z-index: 100; transition: transform 0.3s; }
        body.light .sidebar { background: rgba(255,255,255,0.95); border-right: 1px solid rgba(0,0,0,0.1); }
        body.purple .sidebar { background: rgba(15,7,23,0.95); border-right: 1px solid rgba(139,92,246,0.2); }
        body.ocean .sidebar { background: rgba(8,47,73,0.95); border-right: 1px solid rgba(14,165,233,0.2); }
        body.forest .sidebar { background: rgba(6,78,59,0.95); border-right: 1px solid rgba(16,185,129,0.2); }
        body.sunset .sidebar { background: rgba(67,20,7,0.95); border-right: 1px solid rgba(249,115,22,0.2); }
        
        .sidebar-header { padding: 2rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        body.light .sidebar-header { border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.3rem; font-weight: 700; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #4F46E5, #8B5CF6); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .sidebar-nav { padding: 1.5rem; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #a1a1aa; text-decoration: none; border-radius: 12px; transition: all 0.3s; margin-bottom: 0.5rem; }
        .nav-item:hover, .nav-item.active { background: rgba(139,92,246,0.15); color: #8B5CF6; }
        body.light .nav-item { color: #475569; }
        body.light .nav-item:hover, body.light .nav-item.active { background: rgba(139,92,246,0.1); }
        
        /* ===== MAIN CONTENT ===== */
        .main-content { margin-left: 280px; padding: 2rem; transition: margin-left 0.3s; }
        
        .top-bar { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        body.light .top-bar { background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.05); }
        body.purple .top-bar { background: rgba(139,92,246,0.05); border: 1px solid rgba(139,92,246,0.2); }
        body.ocean .top-bar { background: rgba(14,165,233,0.05); border: 1px solid rgba(14,165,233,0.2); }
        body.forest .top-bar { background: rgba(16,185,129,0.05); border: 1px solid rgba(16,185,129,0.2); }
        body.sunset .top-bar { background: rgba(249,115,22,0.05); border: 1px solid rgba(249,115,22,0.2); }
        
        .search-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 50px; width: 300px; color: white; transition: all 0.3s; }
        body.light .search-box { background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.1); color: #0f172a; }
        .search-box:focus { outline: none; border-color: #8B5CF6; box-shadow: 0 0 0 3px rgba(139,92,246,0.1); }
        
        .user-info { display: flex; align-items: center; gap: 1rem; }
        .user-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #4F46E5, #8B5CF6); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.3s; }
        .user-avatar:hover { transform: scale(1.05); }
        
        /* ===== TASK FILTERS ===== */
        .task-filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; cursor: pointer; transition: all 0.3s; color: #a1a1aa; }
        body.light .filter-btn { background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.1); color: #475569; }
        .filter-btn.active, .filter-btn:hover { background: rgba(139,92,246,0.2); border-color: #8B5CF6; color: #8B5CF6; }
        
        /* ===== TASK LIST ===== */
        .tasks-list { display: flex; flex-direction: column; gap: 1rem; }
        .task-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 1rem; display: flex; align-items: center; gap: 1rem; transition: all 0.3s; }
        body.light .task-item { background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.05); }
        .task-item:hover { background: rgba(139,92,246,0.05); border-color: rgba(139,92,246,0.3); }
        .task-checkbox { width: 24px; height: 24px; cursor: pointer; accent-color: #8B5CF6; }
        .task-content { flex: 1; }
        .task-title { font-weight: 600; margin-bottom: 0.25rem; }
        .task-title.completed { text-decoration: line-through; color: #71717a; }
        .task-meta { font-size: 0.75rem; color: #71717a; display: flex; gap: 1rem; flex-wrap: wrap; }
        .task-description { font-size: 0.8rem; color: #a1a1aa; margin-top: 0.25rem; }
        .priority-high { color: #ef4444; }
        .priority-medium { color: #f59e0b; }
        .priority-low { color: #10b981; }
        
        /* ===== BUTTONS ===== */
        .btn-primary { background: linear-gradient(135deg, #4F46E5, #8B5CF6); padding: 10px 20px; border: none; border-radius: 12px; color: white; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79,70,229,0.4); }
        .btn-icon { padding: 6px 12px; background: rgba(139,92,246,0.2); border: none; border-radius: 8px; color: #8B5CF6; cursor: pointer; transition: all 0.3s; }
        .btn-icon:hover { background: rgba(139,92,246,0.4); }
        .btn-danger { background: rgba(239,68,68,0.2); color: #ef4444; }
        .btn-danger:hover { background: rgba(239,68,68,0.4); }
        
        /* ===== MODAL ===== */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .modal-content { background: #1a1a2e; border: 1px solid rgba(139,92,246,0.3); border-radius: 24px; padding: 2rem; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        body.light .modal-content { background: #ffffff; border: 1px solid rgba(0,0,0,0.1); }
        body.purple .modal-content { background: #1a0b2e; border: 1px solid rgba(139,92,246,0.3); }
        body.ocean .modal-content { background: #0c4a6e; border: 1px solid rgba(14,165,233,0.3); }
        body.forest .modal-content { background: #065f46; border: 1px solid rgba(16,185,129,0.3); }
        body.sunset .modal-content { background: #7c2d12; border: 1px solid rgba(249,115,22,0.3); }
        
        .modal-content h3 { margin-bottom: 1.5rem; font-size: 1.4rem; }
        .modal-content label { display: block; margin-bottom: 0.5rem; color: #a1a1aa; font-size: 0.875rem; }
        
        .modal-content input,
        .modal-content textarea,
        .modal-content select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 1.2rem; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            color: white; 
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        body.light .modal-content input,
        body.light .modal-content textarea,
        body.light .modal-content select { background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.1); color: #0f172a; }
        
        .modal-content input:focus,
        .modal-content textarea:focus,
        .modal-content select:focus {
            outline: none;
            border-color: #8B5CF6;
            box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
        }
        .modal-content textarea { resize: vertical; min-height: 80px; font-family: inherit; }
        .modal-content select option { background: #1a1a2e; color: white; }
        body.light .modal-content select option { background: #ffffff; color: #0f172a; }
        
        .modal-actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem; }
        .modal-actions .btn-icon { padding: 10px 20px; font-size: 0.95rem; }
        .modal-actions .btn-primary { padding: 10px 20px; font-size: 0.95rem; }
        
        /* ===== TOAST ===== */
        .toast { 
            position: fixed; bottom: 30px; right: 30px; padding: 12px 24px; border-radius: 12px; color: white; font-size: 0.9rem; z-index: 10001; animation: slideInRight 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .toast.info { background: #3b82f6; }
        .toast.warning { background: #f59e0b; }
        
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* ===== COMPACT MODE ===== */
        body.compact .task-item { padding: 0.75rem; }
        body.compact .main-content { padding: 1rem; }
        body.compact .top-bar { padding: 0.75rem 1rem; }
        body.compact .modal-content { padding: 1.5rem; }
        body.compact .modal-content input,
        body.compact .modal-content textarea,
        body.compact .modal-content select { padding: 8px; margin-bottom: 0.8rem; }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) { 
            .sidebar { transform: translateX(-100%); } 
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 1rem; }
            .search-box { width: 100%; }
            .top-bar { flex-direction: column; align-items: stretch; }
            .task-filters { justify-content: center; }
            .modal-content { padding: 1.5rem; }
            .task-item { flex-wrap: wrap; }
            .task-meta { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">🔐</div>
                <span>Alan Vault</span>
            </div>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
            <a href="vault.html" class="nav-item">📁 My Vault</a>
            <a href="notes.html" class="nav-item">📝 Notes</a>
            <a href="tasks.html" class="nav-item active">✅ Tasks</a>
            <a href="bookmarks.html" class="nav-item">🔗 Bookmarks</a>
            <a href="analytics.html" class="nav-item">📈 Analytics</a>
            <a href="settings.html" class="nav-item">⚙️ Settings</a>
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content">
        <div class="top-bar">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search tasks..." onkeyup="filterTasks()">
            <div class="user-info">
                <span id="usernameDisplay"></span>
                <div class="user-avatar" onclick="location.href='profile.html'">👤</div>
            </div>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
            <h1>✅ Tasks</h1>
            <button class="btn-primary" onclick="openTaskModal()">+ New Task</button>
        </div>
        
        <div class="task-filters">
            <button class="filter-btn active" onclick="setFilter('all')">All</button>
            <button class="filter-btn" onclick="setFilter('pending')">Pending</button>
            <button class="filter-btn" onclick="setFilter('completed')">Completed</button>
            <button class="filter-btn" onclick="setFilter('high')">High Priority</button>
        </div>
        
        <div id="tasksList" class="tasks-list"></div>
    </div>

    <!-- ===== MODAL ===== -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">✅ New Task</h3>
            
            <label>Task Title *</label>
            <input type="text" id="taskTitle" placeholder="Enter task title...">
            
            <label>Priority</label>
            <select id="taskPriority">
                <option value="Low">🟢 Low</option>
                <option value="Medium" selected>🟠 Medium</option>
                <option value="High">🔴 High</option>
            </select>
            
            <label>Due Date</label>
            <input type="date" id="taskDueDate">
            
            <label>Description (optional)</label>
            <textarea id="taskDescription" rows="3" placeholder="Add task description..."></textarea>
            
            <div class="modal-actions">
                <button class="btn-icon" onclick="closeTaskModal()">Cancel</button>
                <button class="btn-primary" onclick="saveTask()">Save Task</button>
            </div>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="theme.js"></script>
    <script>
        let currentUser = null;
        let currentEditId = null;
        let tasks = [];
        let currentFilter = 'all';
        
        // ========================================
        // INITIALIZATION
        // ========================================
        
        function init() {
            const user = localStorage.getItem('currentUser');
            if (!user) { location.href='login.html'; return; }
            currentUser = JSON.parse(user);
            document.getElementById('usernameDisplay').textContent = currentUser.username;
            loadTasks();
            renderTasks();
            
            // Apply theme
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.body.className = savedTheme;
            
            // Apply compact mode
            const settings = JSON.parse(localStorage.getItem(`settings_${currentUser.id}`) || '{}');
            if (settings.compactMode) {
                document.body.classList.add('compact');
            }
        }
        
        function loadTasks() {
            const vault = JSON.parse(localStorage.getItem(`vault_${currentUser.id}`) || '{"tasks":[]}');
            tasks = vault.tasks || [];
        }
        
        function saveTasks() {
            const vault = JSON.parse(localStorage.getItem(`vault_${currentUser.id}`) || '{"files":[],"notes":[],"tasks":[],"bookmarks":[]}');
            vault.tasks = tasks;
            localStorage.setItem(`vault_${currentUser.id}`, JSON.stringify(vault));
            renderTasks();
        }
        
        // ========================================
        // RENDER TASKS
        // ========================================
        
        function renderTasks() {
            let filtered = tasks;
            
            // Apply filter
            if (currentFilter === 'pending') {
                filtered = tasks.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filtered = tasks.filter(t => t.completed);
            } else if (currentFilter === 'high') {
                filtered = tasks.filter(t => t.priority === 'High');
            }
            
            // Apply search
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (query) {
                filtered = filtered.filter(t => t.title.toLowerCase().includes(query) || (t.description && t.description.toLowerCase().includes(query)));
            }
            
            const container = document.getElementById('tasksList');
            
            if (!filtered.length) {
                container.innerHTML = `
                    <div style="text-align:center; padding:4rem; color:#71717a;">
                        <div style="font-size:4rem; margin-bottom:1rem;">✅</div>
                        <p>No tasks found</p>
                        <button class="btn-primary" style="margin-top:1rem;" onclick="openTaskModal()">+ Create Task</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filtered.map((task) => {
                const realIndex = tasks.indexOf(task);
                const priorityClass = task.priority ? task.priority.toLowerCase() : 'medium';
                
                return `
                    <div class="task-item">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${realIndex})">
                        <div class="task-content">
                            <div class="task-title ${task.completed ? 'completed' : ''}">${escapeHtml(task.title)}</div>
                            <div class="task-meta">
                                <span class="priority-${priorityClass}">${task.priority || 'Medium'}</span>
                                <span>📅 ${task.dueDate || 'No due date'}</span>
                                ${task.description ? `<span>📝 ${escapeHtml(task.description.substring(0, 40))}${task.description.length > 40 ? '...' : ''}</span>` : ''}
                            </div>
                            ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                        </div>
                        <div>
                            <button class="btn-icon" onclick="editTask(${realIndex})" title="Edit">✏️</button>
                            <button class="btn-icon btn-danger" onclick="deleteTask(${realIndex})" title="Delete">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // ========================================
        // MODAL FUNCTIONS
        // ========================================
        
        function openTaskModal(task = null) {
            currentEditId = task ? tasks.indexOf(task) : null;
            
            const modal = document.getElementById('taskModal');
            const title = document.getElementById('modalTitle');
            
            if (task) {
                title.textContent = '✏️ Edit Task';
                document.getElementById('taskTitle').value = task.title || '';
                document.getElementById('taskPriority').value = task.priority || 'Medium';
                document.getElementById('taskDueDate').value = task.dueDate || '';
                document.getElementById('taskDescription').value = task.description || '';
            } else {
                title.textContent = '✅ New Task';
                document.getElementById('taskTitle').value = '';
                document.getElementById('taskPriority').value = 'Medium';
                document.getElementById('taskDueDate').value = '';
                document.getElementById('taskDescription').value = '';
            }
            
            modal.classList.add('active');
            
            // Auto-focus title
            setTimeout(() => {
                document.getElementById('taskTitle').focus();
            }, 100);
            
            // Enter key to navigate fields
            document.getElementById('taskTitle').onkeypress = function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('taskPriority').focus();
                }
            };
            document.getElementById('taskPriority').onkeypress = function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('taskDueDate').focus();
                }
            };
            document.getElementById('taskDueDate').onkeypress = function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('taskDescription').focus();
                }
            };
            document.getElementById('taskDescription').onkeypress = function(e) {
                if (e.key === 'Enter' && e.shiftKey) {
                    e.preventDefault();
                    saveTask();
                }
            };
        }
        
        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('active');
            currentEditId = null;
        }
        
        function saveTask() {
            const title = document.getElementById('taskTitle').value.trim();
            const priority = document.getElementById('taskPriority').value;
            const dueDate = document.getElementById('taskDueDate').value;
            const description = document.getElementById('taskDescription').value.trim();
            
            if (!title) {
                showToast('Please enter a task title', 'error');
                document.getElementById('taskTitle').style.borderColor = '#ef4444';
                setTimeout(() => {
                    document.getElementById('taskTitle').style.borderColor = '';
                }, 2000);
                return;
            }
            
            if (currentEditId !== null) {
                tasks[currentEditId] = {
                    ...tasks[currentEditId],
                    title: title,
                    priority: priority,
                    dueDate: dueDate,
                    description: description,
                    updated: new Date().toISOString()
                };
                showToast('Task updated! ✅', 'success');
            } else {
                tasks.unshift({
                    id: Date.now(),
                    title: title,
                    priority: priority,
                    dueDate: dueDate,
                    description: description,
                    completed: false,
                    created: new Date().toISOString()
                });
                showToast('Task created! ✅', 'success');
            }
            
            saveTasks();
            closeTaskModal();
        }
        
        // ========================================
        // TASK OPERATIONS
        // ========================================
        
        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            showToast(tasks[index].completed ? '✅ Task completed!' : '🔄 Task reopened', 'success');
        }
        
        function editTask(index) {
            openTaskModal(tasks[index]);
        }
        
        function deleteTask(index) {
            if (confirm('Delete this task?')) {
                tasks.splice(index, 1);
                saveTasks();
                showToast('🗑️ Task deleted', 'info');
            }
        }
        
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            
            // Find the clicked button and mark it active
            const buttons = document.querySelectorAll('.filter-btn');
            const filterMap = {
                'all': 0,
                'pending': 1,
                'completed': 2,
                'high': 3
            };
            const index = filterMap[filter] || 0;
            if (buttons[index]) buttons[index].classList.add('active');
            
            renderTasks();
        }
        
        function filterTasks() {
            renderTasks();
        }
        
        // ========================================
        // UTILITY FUNCTIONS
        // ========================================
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // ========================================
        // CLOSE MODAL ON ESCAPE & CLICK OUTSIDE
        // ========================================
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('taskModal');
                if (modal.classList.contains('active')) {
                    closeTaskModal();
                }
            }
        });
        
        document.getElementById('taskModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeTaskModal();
            }
        });
        
        // ========================================
        // START
        // ========================================
        
        document.addEventListener('DOMContentLoaded', init);
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            init();
        }
    </script>
</body>
</html>
