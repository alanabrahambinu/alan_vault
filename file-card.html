<!-- file-card.html - File Card Component -->
<div class="file-card-component" id="fileCard">
    <div class="file-card-inner">
        <div class="file-preview">
            <div class="file-icon-large">📄</div>
        </div>
        <div class="file-info">
            <h4 class="file-name">document.pdf</h4>
            <div class="file-meta">
                <span class="file-size">2.5 MB</span>
                <span class="file-date">Dec 15, 2024</span>
            </div>
        </div>
        <div class="file-actions">
            <button class="file-action-btn download" title="Download">📥</button>
            <button class="file-action-btn share" title="Share">🔗</button>
            <button class="file-action-btn delete" title="Delete">🗑️</button>
        </div>
    </div>
</div>

<style>
    .file-card-component {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        transition: all 0.3s;
        cursor: pointer;
        overflow: hidden;
    }
    
    .file-card-component:hover {
        transform: translateY(-5px);
        border-color: rgba(139, 92, 246, 0.3);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    .file-card-inner {
        padding: 1rem;
    }
    
    .file-preview {
        text-align: center;
        margin-bottom: 1rem;
    }
    
    .file-icon-large {
        font-size: 3rem;
        margin-bottom: 0.5rem;
    }
    
    .file-info {
        text-align: center;
        margin-bottom: 1rem;
    }
    
    .file-name {
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
        word-break: break-word;
    }
    
    .file-meta {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        font-size: 0.7rem;
        color: var(--text-tertiary);
    }
    
    .file-actions {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        opacity: 0;
        transition: opacity 0.3s;
    }
    
    .file-card-component:hover .file-actions {
        opacity: 1;
    }
    
    .file-action-btn {
        width: 32px;
        height: 32px;
        background: rgba(139, 92, 246, 0.2);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 0.9rem;
    }
    
    .file-action-btn:hover {
        background: rgba(139, 92, 246, 0.4);
        transform: scale(1.05);
    }
    
    .file-action-btn.delete:hover {
        background: rgba(239, 68, 68, 0.4);
    }
    
    /* Grid View */
    .file-card-component.grid-view {
        width: 100%;
    }
    
    /* List View */
    .file-card-component.list-view {
        display: flex;
        align-items: center;
        padding: 0.75rem;
    }
    
    .file-card-component.list-view .file-card-inner {
        display: flex;
        align-items: center;
        gap: 1rem;
        width: 100%;
        padding: 0;
    }
    
    .file-card-component.list-view .file-preview {
        margin-bottom: 0;
    }
    
    .file-card-component.list-view .file-info {
        flex: 1;
        text-align: left;
        margin-bottom: 0;
    }
    
    .file-card-component.list-view .file-meta {
        justify-content: flex-start;
    }
    
    .file-card-component.list-view .file-actions {
        opacity: 1;
    }
</style>

<script>
    class FileCard {
        constructor(file, index, onDelete, onDownload) {
            this.file = file;
            this.index = index;
            this.onDelete = onDelete;
            this.onDownload = onDownload;
        }
        
        render(view = 'grid') {
            const card = document.createElement('div');
            card.className = `file-card-component ${view}-view`;
            card.innerHTML = `
                <div class="file-card-inner">
                    <div class="file-preview">
                        <div class="file-icon-large">${this.getFileIcon()}</div>
                    </div>
                    <div class="file-info">
                        <h4 class="file-name">${this.escapeHtml(this.file.name)}</h4>
                        <div class="file-meta">
                            <span class="file-size">${this.formatBytes(this.file.size)}</span>
                            <span class="file-date">${new Date(this.file.date).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <div class="file-actions">
                        <button class="file-action-btn download" data-action="download">📥</button>
                        <button class="file-action-btn share" data-action="share">🔗</button>
                        <button class="file-action-btn delete" data-action="delete">🗑️</button>
                    </div>
                </div>
            `;
            
            card.querySelector('[data-action="download"]').addEventListener('click', (e) => {
                e.stopPropagation();
                if (this.onDownload) this.onDownload(this.index);
            });
            
            card.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
                e.stopPropagation();
                if (this.onDelete && confirm('Delete this file?')) this.onDelete(this.index);
            });
            
            card.querySelector('[data-action="share"]').addEventListener('click', (e) => {
                e.stopPropagation();
                this.shareFile();
            });
            
            card.addEventListener('click', () => this.openFile());
            
            return card;
        }
        
        getFileIcon() {
            const ext = this.file.name.split('.').pop().toLowerCase();
            const icons = {
                pdf: '📕', doc: '📘', docx: '📘', xls: '📗', xlsx: '📗',
                ppt: '📙', pptx: '📙', jpg: '🖼️', jpeg: '🖼️', png: '🖼️',
                gif: '🖼️', mp4: '🎬', mp3: '🎵', zip: '📦', rar: '📦'
            };
            return icons[ext] || '📄';
        }
        
        openFile() {
            if (this.file.data) {
                window.open(this.file.data, '_blank');
            }
        }
        
        shareFile() {
            if (navigator.share) {
                navigator.share({ title: this.file.name, url: this.file.data });
            } else {
                navigator.clipboard.writeText(this.file.data);
                alert('Link copied to clipboard!');
            }
        }
        
        formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    }
</script>
