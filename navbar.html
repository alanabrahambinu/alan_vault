<!-- navbar.html - Navigation Bar Component -->
<nav class="main-navbar">
    <div class="navbar-container">
        <div class="navbar-brand">
            <div class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</div>
            <a href="dashboard.html" class="logo">
                <div class="logo-icon">🔐</div>
                <span class="logo-text">Alan Vault</span>
            </a>
        </div>
        
        <div class="navbar-search">
            <span class="search-icon">🔍</span>
            <input type="text" id="navbarSearch" placeholder="Search files, notes, tasks..." onkeypress="handleSearch(event)">
        </div>
        
        <div class="navbar-actions">
            <div class="action-icon" onclick="openNotifications()">
                🔔
                <span class="notification-badge" id="notificationBadge">3</span>
            </div>
            <div class="action-icon" onclick="openUpload()">📤</div>
            <div class="user-menu" onclick="toggleUserMenu()">
                <div class="user-avatar">👤</div>
                <div class="user-dropdown" id="userDropdown">
                    <a href="profile.html" class="dropdown-item">👤 My Profile</a>
                    <a href="settings.html" class="dropdown-item">⚙️ Settings</a>
                    <a href="analytics.html" class="dropdown-item">📊 Analytics</a>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="dropdown-item" onclick="logout()">🚪 Logout</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<style>
    .main-navbar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(10, 10, 15, 0.95);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        padding: 0.75rem 2rem;
    }
    
    .navbar-container {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 2rem;
    }
    
    .navbar-brand {
        display: flex;
        align-items: center;
        gap: 1rem;
    }
    
    .mobile-menu-btn {
        display: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: white;
    }
    
    .logo {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
        font-size: 1.2rem;
        font-weight: 700;
    }
    
    .logo-icon {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, #4F46E5, #8B5CF6);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .logo-text {
        background: linear-gradient(135deg, #fff, #8B5CF6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    
    .navbar-search {
        flex: 1;
        max-width: 400px;
        position: relative;
    }
    
    .navbar-search input {
        width: 100%;
        padding: 0.6rem 1rem 0.6rem 2.2rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50px;
        color: white;
        font-size: 0.9rem;
        transition: all 0.3s;
    }
    
    .navbar-search input:focus {
        outline: none;
        border-color: #8B5CF6;
        background: rgba(255, 255, 255, 0.08);
    }
    
    .search-icon {
        position: absolute;
        left: 0.75rem;
        top: 50%;
        transform: translateY(-50%);
        color: #71717a;
        font-size: 0.9rem;
    }
    
    .navbar-actions {
        display: flex;
        align-items: center;
        gap: 1rem;
    }
    
    .action-icon {
        position: relative;
        font-size: 1.2rem;
        cursor: pointer;
        padding: 0.5rem;
        border-radius: 8px;
        transition: all 0.3s;
    }
    
    .action-icon:hover {
        background: rgba(139, 92, 246, 0.1);
    }
    
    .notification-badge {
        position: absolute;
        top: -2px;
        right: -2px;
        background: #ef4444;
        color: white;
        font-size: 0.6rem;
        padding: 2px 5px;
        border-radius: 10px;
        min-width: 16px;
        text-align: center;
    }
    
    .user-menu {
        position: relative;
        cursor: pointer;
    }
    
    .user-avatar {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #4F46E5, #8B5CF6);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.3s;
    }
    
    .user-avatar:hover {
        transform: scale(1.05);
    }
    
    .user-dropdown {
        position: absolute;
        top: 100%;
        right: 0;
        margin-top: 0.5rem;
        background: rgba(26, 26, 46, 0.98);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(139, 92, 246, 0.3);
        border-radius: 12px;
        min-width: 200px;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: all 0.3s;
        z-index: 100;
    }
    
    .user-menu:hover .user-dropdown {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }
    
    .dropdown-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        color: #a1a1aa;
        text-decoration: none;
        transition: all 0.3s;
    }
    
    .dropdown-item:hover {
        background: rgba(139, 92, 246, 0.1);
        color: #8B5CF6;
    }
    
    .dropdown-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.05);
        margin: 0.25rem 0;
    }
    
    @media (max-width: 768px) {
        .main-navbar {
            padding: 0.75rem 1rem;
        }
        
        .mobile-menu-btn {
            display: block;
        }
        
        .logo-text {
            display: none;
        }
        
        .navbar-search {
            max-width: 200px;
        }
    }
    
    @media (max-width: 480px) {
        .navbar-search {
            display: none;
        }
    }
</style>

<script>
    function toggleMobileMenu() {
        document.querySelector('.sidebar')?.classList.toggle('active');
    }
    
    function handleSearch(event) {
        if (event.key === 'Enter') {
            const query = event.target.value.trim();
            if (query) {
                window.location.href = `search.html?q=${encodeURIComponent(query)}`;
            }
        }
    }
    
    function openNotifications() {
        window.location.href = 'activity.html';
    }
    
    function openUpload() {
        window.location.href = 'upload.html';
    }
    
    function toggleUserMenu() {
        document.getElementById('userDropdown').classList.toggle('show');
    }
    
    function logout() {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('loggedIn');
        window.location.href = 'login.html';
    }
    
    // Update notification badge
    function updateNotificationBadge() {
        const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
        const vault = JSON.parse(localStorage.getItem(`vault_${user.id}`) || '{"tasks":[]}');
        const pendingTasks = vault.tasks?.filter(t => !t.completed).length || 0;
        const badge = document.getElementById('notificationBadge');
        if (badge) {
            badge.textContent = pendingTasks > 0 ? pendingTasks : '';
            badge.style.display = pendingTasks > 0 ? 'block' : 'none';
        }
    }
    
    document.addEventListener('DOMContentLoaded', updateNotificationBadge);
</script>
